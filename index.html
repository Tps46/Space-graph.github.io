<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galactic Navigation Matrix</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #020508;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 10, 20, 0.92);
            padding: 18px 16px;
            border: 1px solid #00f2ff;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.15);
            min-width: 185px;
        }
        .input-group { margin-bottom: 11px; }
        label { display: block; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; color: #556; }
        input {
            background: #000;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 5px 7px;
            width: 155px;
            font-size: 12px;
        }
        button {
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 9px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            width: 100%;
            margin-top: 4px;
            transition: background 0.15s;
        }
        button:hover { background: #fff; }
        .btn-danger { background: #b5212a; color: #fff; margin-top: 12px; }
        .btn-danger:hover { background: #e02535; }
        .separator { border-top: 1px solid #111; margin: 13px 0; }
        .future-note { color: #223; font-size: 9px; font-style: italic; line-height: 1.5; }

        #canvas-container { width: 100vw; height: 70vh; display: block; }

        #matrix-container {
            width: 96%;
            margin: 16px auto 30px;
            background: rgba(0, 5, 10, 0.95);
            border: 1px solid #004444;
            padding: 18px;
            overflow-x: auto;
        }
        #matrix-title {
            margin: 0 0 14px 0;
            font-size: 11px;
            letter-spacing: 3px;
            color: #00f2ff;
            text-transform: uppercase;
        }
        table { border-collapse: collapse; font-size: 10px; color: #00f2ff; }
        th, td { border: 1px solid #002222; padding: 4px 7px; text-align: center; white-space: nowrap; }
        th { background: rgba(0,242,255,0.04); color: #556; font-size: 9px; letter-spacing: 1px; }
        .col-id    { font-weight: bold; color: #00f2ff; }
        .col-name  { color: #334; font-size: 9px; }
        .start-row { color: #ff4d5a !important; font-weight: bold; }
        .cell-self { color: #111; }
        .cell-w    { color: #00f2ff; }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="input-group">
        <label>Nœuds (systèmes)</label>
        <input type="number" id="nodeCount" value="12" min="2">
    </div>
    <div class="input-group">
        <label>Secteur Seed</label>
        <input type="text" id="seedInput" value="KASHYYYK-9">
    </div>
    <button onclick="generate()">⟳ Générer</button>
    <button class="btn-danger" onclick="copyNumpy()">⬡ Copier NumPy</button>

    <div class="separator"></div>
    <div class="future-note">
        // future: k_vehicles<br>
        // future: start_node<br>
        // future: dangerous_edges<br>
        // future: lives = 3
    </div>
</div>

<div id="canvas-container"></div>

<div id="matrix-container">
    <h3 id="matrix-title">[ Navigation Data Matrix ]</h3>
    <div id="matrix-output"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/*
 * ─── GRAPH STATE ────────────────────────────────────────────────────────────
 * Extensible structure for the future NP-hard min-max k-TSP variant:
 *   • kVehicles vehicles start at startNode, each vertex visited exactly once
 *   • Objective: minimise the longest individual tour
 *   • dangerousEdges: edges that consume lives when traversed
 *   • lives: shared pool of 3 lives across all vehicles
 */
const graphState = {
    nodes:          [],   // [{id:int, name:str, pos:THREE.Vector3}]
    matrix:         [],   // n×n integer weight adjacency matrix (complete graph)
    startNode:      0,    // [PARAM]  predefined departure node
    kVehicles:      1,    // [FUTURE] number of vehicles
    dangerousEdges: [],   // [FUTURE] [{i, j, liveCost}]
    lives:          3,    // [FUTURE] total lives
};

// ─── SEEDED RNG ───────────────────────────────────────────────────────────────
function mulberry32(seed) {
    return () => {
        seed += 0x6D2B79F5;
        let t = Math.imul(seed ^ seed >>> 15, seed | 1);
        t ^= t + Math.imul(t ^ t >>> 7, t | 61);
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}
function hashStr(s) {
    let h = 0;
    for (const c of s) { h = ((h << 5) - h) + c.charCodeAt(0); h |= 0; }
    return h;
}

// ─── PLANET NAME GENERATOR ────────────────────────────────────────────────────
// 32 × 22 × 28 = 19 712 unique deterministic names
const NP = {
    pre: ['Tat','Cor','Hot','End','Nab','Dag','Bes','Ald','Kam','Mus',
          'Geo','Uta','Kas','Myg','Fel','Sal','Dan','Kij','Kor','Yav',
          'Jak','Tak','Ahch','Cra','Exe','Nev','Sor','Lot','Mal','Nar',
          'Ryl','Sul'],
    mid: ['a','oo','ui','ao','ei','ia','ou','ee','an','or',
          'al','en','in','ar','el','un','ir','ux','om','ez',
          'yr','ith'],
    suf: ['ine','ant','or','oon','bah','pin','aan','ino','far','sis',
          'pau','yk','eto','cia','ami','tou','ku','gol','dor','al',
          'mir','von','ath','esk','onx','deen','aris','ovar']
};
function planetName(i) {
    const P = NP.pre.length, I = NP.mid.length, S = NP.suf.length;
    return NP.pre[i % P] + NP.mid[Math.floor(i / P) % I] + NP.suf[Math.floor(i / (P * I)) % S];
}

// ─── THREE.JS CORE ────────────────────────────────────────────────────────────
let scene, camera, renderer, controls, graphGroup, nebulaGroup;

function init() {
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / (window.innerHeight * 0.7), 0.1, 1000);
    camera.position.set(50, 38, 50);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight * 0.7);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;

    nebulaGroup = buildNebula();
    scene.add(nebulaGroup);

    graphGroup = new THREE.Group();
    scene.add(graphGroup);

    animate();
    generate();
}

// ─── NEBULA ───────────────────────────────────────────────────────────────────
// Flat disk effect: multiple PlaneGeometry layers laid in XZ plane,
// each with a canvas-gradient texture and AdditiveBlending.
// The slight tilt offsets between layers fake 3-D depth.
function buildNebula() {
    const g = new THREE.Group();

    function gradTex(fn) {
        const s = 512, cv = document.createElement('canvas');
        cv.width = cv.height = s;
        const ctx = cv.getContext('2d');
        ctx.clearRect(0, 0, s, s);
        fn(ctx, s);
        return new THREE.CanvasTexture(cv);
    }

    // 1. Bright stellar core
    const tCore = gradTex((ctx, s) => {
        const g = ctx.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
        g.addColorStop(0,    'rgba(215,238,255,1.0)');
        g.addColorStop(0.05, 'rgba(140,195,255,0.88)');
        g.addColorStop(0.13, 'rgba(75,138,245,0.55)');
        g.addColorStop(0.30, 'rgba(45,75,185,0.18)');
        g.addColorStop(0.60, 'rgba(20,35,105,0.05)');
        g.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
    });

    // 2. Wide nebula disk with faint spiral arms
    const tDisk = gradTex((ctx, s) => {
        const g = ctx.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
        g.addColorStop(0,    'rgba(85,150,255,0.38)');
        g.addColorStop(0.18, 'rgba(60,100,215,0.20)');
        g.addColorStop(0.45, 'rgba(70,40,175,0.10)');
        g.addColorStop(0.72, 'rgba(35,12,85,0.04)');
        g.addColorStop(1,    'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
        // Three faint arms
        for (let k = 0; k < 3; k++) {
            ctx.save();
            ctx.translate(s/2, s/2);
            ctx.rotate(k * Math.PI * 2 / 3 + 0.5);
            ctx.scale(0.20, 1);
            const ag = ctx.createRadialGradient(0,0,0, 0,0,s*0.47);
            ag.addColorStop(0,   'rgba(115,175,255,0.15)');
            ag.addColorStop(0.55,'rgba(65,95,205,0.06)');
            ag.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.fillStyle = ag;
            ctx.beginPath(); ctx.arc(0,0,s*0.47,0,Math.PI*2); ctx.fill();
            ctx.restore();
        }
    });

    // 3. Warm outer haze (purple/crimson rim)
    const tHaze = gradTex((ctx, s) => {
        const g = ctx.createRadialGradient(s/2,s/2,s*0.08, s/2,s/2,s/2);
        g.addColorStop(0,   'rgba(140,55,210,0.06)');
        g.addColorStop(0.40,'rgba(100,30,165,0.09)');
        g.addColorStop(0.68,'rgba(175,55,80,0.06)');
        g.addColorStop(0.88,'rgba(80,20,40,0.03)');
        g.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = g; ctx.fillRect(0,0,s,s);
    });

    // Helper: lay a PlaneGeometry flat (XZ plane) then apply slight tilt
    // sx/sz = scale in world X and Z; tiltX = extra x-axis tilt; rotY = y-rotation
    function addLayer(tex, sx, sz, tiltX, rotY, opacity) {
        const mat = new THREE.MeshBasicMaterial({
            map: tex,
            transparent: true,
            opacity,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            side: THREE.DoubleSide,
        });
        const mesh = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
        // -PI/2 lays the plane flat; tiltX adds the organic warp
        mesh.rotation.set(-Math.PI / 2 + tiltX, rotY, 0);
        mesh.scale.set(sx, sz, 1);
        g.add(mesh);
    }

    // Stacked layers — together they form a convincing flattened nebula
    //                     sx    sz   tiltX  rotY  opacity
    addLayer(tCore,         38,   38,  0.00,  0.00, 0.95);  // core glow
    addLayer(tDisk,        130,   88,  0.00,  0.00, 0.82);  // main disk
    addLayer(tDisk,        115,  105,  0.07,  0.90, 0.58);  // slight tilt A
    addLayer(tDisk,        148,   68,  0.10,  2.10, 0.46);  // slight tilt B
    addLayer(tDisk,         95,  125, -0.06,  1.45, 0.42);  // slight tilt C
    addLayer(tHaze,        175,  115,  0.00,  0.00, 0.52);  // outer warm haze
    addLayer(tHaze,        160,  135,  0.05,  1.10, 0.36);  // tilted haze

    return g;
}

// ─── TEXT SPRITE ──────────────────────────────────────────────────────────────
function makeLabel(text, color) {
    const cv = document.createElement('canvas');
    cv.width = 64; cv.height = 32;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = color;
    ctx.font = 'bold 17px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 32, 16);
    const mat = new THREE.SpriteMaterial({
        map: new THREE.CanvasTexture(cv),
        transparent: true,
        depthWrite: false,
    });
    const s = new THREE.Sprite(mat);
    s.scale.set(2.4, 1.2, 1);
    return s;
}

// ─── GRAPH GENERATION ─────────────────────────────────────────────────────────
function generate() {
    while (graphGroup.children.length > 0) graphGroup.remove(graphGroup.children[0]);

    const n   = Math.max(2, parseInt(document.getElementById('nodeCount').value) || 12);
    const rng = mulberry32(hashStr(document.getElementById('seedInput').value));

    const nodes  = [];
    const INNER  = 20, WIDTH = 28;

    for (let i = 0; i < n; i++) {
        const r     = INNER + rng() * WIDTH;
        const theta = rng() * Math.PI * 2;
        const y     = (rng() - 0.5) * 12;
        const pos   = new THREE.Vector3(r * Math.cos(theta), y, r * Math.sin(theta));
        nodes.push({ id: i, name: planetName(i), pos });

        const isStart = (i === graphState.startNode);
        const sphere  = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 8, 8),
            new THREE.MeshBasicMaterial({ color: isStart ? 0xff4d5a : 0x00f2ff, wireframe: true })
        );
        sphere.position.copy(pos);
        graphGroup.add(sphere);

        const label = makeLabel(String(i), isStart ? '#ff4d5a' : '#00f2ff');
        label.position.copy(pos).add(new THREE.Vector3(0, 2.3, 0));
        graphGroup.add(label);
    }

    // Complete graph: one shared edge material, integer weights
    const matrix  = Array.from({ length: n }, () => Array(n).fill(0));
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.06 });

    for (let i = 0; i < n; i++) {
        for (let j = i + 1; j < n; j++) {
            graphGroup.add(new THREE.Line(
                new THREE.BufferGeometry().setFromPoints([nodes[i].pos, nodes[j].pos]),
                edgeMat
            ));
            const w          = Math.max(1, Math.round(nodes[i].pos.distanceTo(nodes[j].pos)));
            matrix[i][j]     = w;
            matrix[j][i]     = w;
        }
    }

    graphState.nodes  = nodes;
    graphState.matrix = matrix;

    renderMatrix();
}

// ─── MATRIX RENDER ────────────────────────────────────────────────────────────
function renderMatrix() {
    const { nodes, matrix, startNode } = graphState;
    const n = nodes.length;

    let html = `<table><thead><tr>
        <th>#</th>
        <th>Planète</th>`;
    for (let j = 0; j < n; j++) html += `<th>${j}</th>`;
    html += '</tr></thead><tbody>';

    matrix.forEach((row, i) => {
        const s = (i === startNode);
        html += `<tr>
            <td class="${s ? 'start-row' : 'col-id'}">${i}</td>
            <td class="${s ? 'start-row' : 'col-name'}">${nodes[i].name}</td>`;
        row.forEach((w, j) => {
            html += `<td class="${i === j ? 'cell-self' : 'cell-w'}">${i === j ? '—' : w}</td>`;
        });
        html += '</tr>';
    });

    document.getElementById('matrix-output').innerHTML = html + '</tbody></table>';
}

// ─── NUMPY EXPORT ─────────────────────────────────────────────────────────────
// Format matches np.array([[...]]) for direct paste into Python.
// Comments carry the metadata needed for the future NP-hard solver.
function copyNumpy() {
    const { matrix, startNode, kVehicles, lives } = graphState;
    const seed = document.getElementById('seedInput').value;
    let s  = `# n=${matrix.length}  start=${startNode}  k_vehicles=${kVehicles}  lives=${lives}  seed="${seed}"\n`;
    s     += `# dangerous_edges=[]  (to be populated)\n`;
    s     += `np.array([\n`;
    matrix.forEach((row, i) => {
        s += `    [${row.join(', ')}]${i < matrix.length - 1 ? ',' : ''}\n`;
    });
    s += `])`;
    navigator.clipboard.writeText(s).then(() => alert('Matrice NumPy copiée !'));
}

// ─── ANIMATION LOOP ───────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    if (nebulaGroup) nebulaGroup.rotation.y += 0.00008; // imperceptibly slow drift
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight * 0.7;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

// Expose to HTML onclick attributes
window.generate   = generate;
window.copyNumpy  = copyNumpy;

init();
</script>
</body>
</html>
